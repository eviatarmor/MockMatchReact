<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robotBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5FFB"/>
      <stop offset="100%" stop-color="#3749F8"/>
    </linearGradient>

    <linearGradient id="faceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11265D"/>
      <stop offset="100%" stop-color="#0B1A45"/>
    </linearGradient>

    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F7FF"/>
      <stop offset="100%" stop-color="#DDE3F2"/>
    </linearGradient>
  </defs>

  <!-- Antenna -->
  <rect x="122" y="28" width="12" height="34" rx="6" fill="url(#robotBlue)"/>
  <circle cx="128" cy="18" r="12" fill="url(#robotBlue)"/>

  <!-- Side Ears -->
  <rect x="28" y="92" width="34" height="72" rx="18" fill="url(#robotBlue)"/>
  <rect x="194" y="92" width="34" height="72" rx="18" fill="url(#robotBlue)"/>

  <!-- Robot Shell -->
  <rect
    x="42"
    y="48"
    width="172"
    height="160"
    rx="52"
    fill="url(#shell)"
  />

  <!-- Face -->
  <rect
    x="62"
    y="72"
    width="132"
    height="112"
    rx="36"
    fill="url(#faceBg)"
  />

  <!-- Eyes -->
  <rect
    x="92"
    y="106"
    width="22"
    height="38"
    rx="11"
    fill="#70E7FF"
  />

  <rect
    x="142"
    y="106"
    width="22"
    height="38"
    rx="11"
    fill="#70E7FF"
  />

  <!-- Smile -->
  <path
    d="M102 154
       Q128 176
       154 154"
    fill="none"
    stroke="#70E7FF"
    stroke-width="9"
    stroke-linecap="round"
  />

  <!-- Bottom Chin -->
  <rect
    x="90"
    y="196"
    width="76"
    height="14"
    rx="7"
    fill="url(#robotBlue)"
  />
