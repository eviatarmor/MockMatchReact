name: mockmatch

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: mockmatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mockmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockmatch}
      POSTGRES_DB: ${POSTGRES_DB:-mockmatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mockmatch} -d ${POSTGRES_DB:-mockmatch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mockmatch-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
